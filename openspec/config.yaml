# OpenSpec 配置文件
# https://github.com/open-s4e/openspec

schema: knowledge-driven
version: "1.0"

# 项目上下文
# 这些上下文信息会在 AI 创建 artifacts 时展示给它
# 包含技术栈、编码规范、风格指南、领域知识等
context: |
  优先使用中文沟通
  ## 项目概述
  MSA (Multi-Strategy Agent) - 基于 AI 的股票交易助手，提供 TUI 终端界面。
  
  ## 技术栈
  - 语言: Go 1.21+
  - CLI 框架: Cobra
  - TUI 框架: Bubble Tea (charmbracelet)
  - UI 样式: Lipgloss
  - 日志: Logrus
  - ORM: GORM
  - 数据库: SQLite (github.com/glebarez/sqlite, 纯 Go 实现)
  - AI/LLM 框架: Cloudwego Eino
  - 支持的 LLM 提供商: SiliconFlow, OpenAI, Claude, Ollama
  
  ## 编码规范
  - 遵循 Go 标准命名规范
  - 错误处理: 返回 error，不要 panic
  - 日志: 使用 logrus 结构化日志
  - 所有金额以"毫"为单位存储（1 元 = 10000 毫）
  - 配置优先级: 命令行参数 > 环境变量 > 配置文件 > 默认值
  
  ## 架构说明（事件驱动 Pipeline 架构）
  - cmd/ - CLI 命令路由 (Cobra)，组装依赖并注入
  - pkg/app/ - 应用启动（TUI 模式入口）
  - pkg/config/ - 配置管理
  - pkg/db/ - 数据库层 (GORM)
  - pkg/core/ - 核心业务逻辑（无 UI 依赖）
    - agent/ - AI 代理：Agent.Run() 返回 <-chan Event，包含 StreamAdapter（处理 Eino stream）
    - runner/ - Runner：消费 event channel，协调 agent → renderer，持久化会话
    - event/ - Event 类型系统（pipeline 通信数据结构）
    - logger/ - 结构化日志，requestID 注入与传播
  - pkg/session/ - 会话管理与持久化（Runner 依赖）
  - pkg/renderer/ - 输出适配层
    - Renderer 接口：Handle(ctx, event.Event) error
    - cli.go - CLI 实现（写 stdout）
    - tui.go - TUI 实现（转发给 bubbletea）
  - pkg/logic/ - 业务逻辑
    - command/ - TUI 命令处理
    - provider/ - LLM 提供商实现
    - tools/ - 工具实现（股票、搜索、金融），工具通过 safetool.SafeExecute 包装
    - skills/ - Skill 动态加载系统
    - finsvc/ - 金融服务（交易、持仓）
  - pkg/model/ - 数据模型
  - pkg/tui/ - 终端 UI 组件（纯 UI，无业务逻辑）
  - pkg/extcli/ - CLI 单次对话模式
  - pkg/utils/ - 工具函数

  ## 核心数据流
  用户输入 → Runner.Ask(ctx, input) → Agent.Run(ctx, messages) → <-chan Event → Renderer.Handle() → CLI/TUI 输出

  ## 已删除的旧包（勿再引用）
  - pkg/logic/agent/ - 已被 pkg/core/agent/ 替代
  - pkg/logic/message/ - 已被 event channel 替代（StreamOutputManager 已删除）
  
  ## 领域知识
  - 股票交易模拟与虚拟账户
  - 持仓追踪与盈亏计算
  - 通过网页抓取获取实时股票数据
  - 通过 AI 解析自然语言交易指令
  
  ## 编译验证方式：
  - go vet ./... 验证编译问题 不要使用 go build 

# Artifact 规则
# 为不同类型的 artifact 定义自定义规则
rules:
  proposal:
    - 提案控制在 800 字以内
    - 必须包含"非目标"章节
    - 适用时引用相关规格文档
    - 考虑向后兼容性

  spec:
    - 遵循格式: 目的、需求（含场景）
    - 场景使用 Given-When-Then 格式
    - 每个需求应可测试
    - 修改行为时引用现有组件
    - 场景必须使用 4 个井号（####），否则会静默失败

  design:
    - 仅在跨领域变更、新架构模式、新外部依赖、安全/性能复杂性时创建
    - 必须包含推荐模式和反模式警告（来自 openspec/knowledge/）
    - 设计决策需说明理由（为什么选 X 而不选 Y）
    - 引用相关历史问题（openspec/knowledge/issues/）

  tasks:
    - 优先使用 superpowers:writing-plans skill 编写任务计划
    - 将任务拆分为不超过 4 小时的子任务，每步 2-5 分钟
    - 包含验证步骤和精确的命令（go vet ./...）
    - 引用 openspec/knowledge/metadata/components.yaml 中的相关组件
    - 使用 openspec/knowledge/metadata/tags.yaml 中的标签
    - 每步必须包含完整代码，不能有占位符

  fix:
    - 使用 openspec/.templates/fix.md 模板
    - 优先使用 superpowers:systematic-debugging skill 进行系统性调试
    - 收到代码审查反馈时使用 superpowers:receiving-code-review skill
    - 必须包含根因分析
    - 适用时关联相关模式或反模式
    - 标记适当的组件（参考 openspec/knowledge/metadata/components.yaml）和严重程度

apply:
  - 优先使用 superpowers:subagent-driven-development skill 执行任务（推荐）
  - 无 subagent 支持时使用 superpowers:executing-plans skill
  - 执行完成后运行 go vet ./... 验证编译


# OpenSpec CLI 日志配置
logging:
  level: info
  format: json
